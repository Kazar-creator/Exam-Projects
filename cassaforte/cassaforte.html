<html>
<head></head>
<body>
    <div style="border: 1px solid black; height: 700px; width: 600px">
        <div style="border: 1px solid black; height: 500px; width: 400px; margin: 0 auto; margin-top: 100px">
            <div style="border: 1px solid black; height: 350px; width: 110px; margin: 0 auto; margin-top: 70px">
                <input id="display" style="width: 100px" readonly>
                
                <!-- Ho aggiunto pulisciMessaggio() agli onclick per resettare il rosso quando ricominci a scrivere -->
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='1';"><div> 1 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='2';"><div> 2 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='3';"><div> 3 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='4';"><div> 4 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='5';"><div> 5 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='6';"><div> 6 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='7';"><div> 7 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='8';"><div> 8 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='9';"><div> 9 </div></button>
                <button type="button" onclick="pulisciMessaggio(); document.getElementById('display').value+='0';"><div> 0 </div></button>
                
                <button type="button" onclick="document.getElementById('display').value=document.getElementById('display').value.slice(0,-1);"><div> C </div></button>
        
                <button type="button" onclick="controlla()" style="background-color:green; color:white; width:100px; cursor:pointer; margin-top: 5px;">
                    <div> PROVA </div>
                </button>
            </div> 
        </div> 
    </div>

    <script>
        const PIN_CORRETTO = "1234";

        // Funzione per pulire il display se c'è un errore quando premi un nuovo numero
        function pulisciMessaggio() {
            const display = document.getElementById('display');
            if (display.value === "ERR" || display.value === "APERTA") {
                display.value = "";
                display.style.backgroundColor = "white";
                display.style.color = "black";
            }
        }

        function controlla() {
            const display = document.getElementById('display');
            const valoreInserito = display.value;

            if (valoreInserito === PIN_CORRETTO) {
                display.value = "APERTA";
                display.style.backgroundColor = "#90EE90";
                display.style.color = "black";
            } else {
                display.value = "ERR";
                display.style.backgroundColor = "#ff4d4d";
                display.style.color = "white";
            }
        }
    </script>
</body>
</html>
